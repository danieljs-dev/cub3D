name: norminette

on: [push, pull_request]

jobs:
  norminette:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Norminette
        run: |
          python -m pip install --upgrade pip
          python -m pip install norminette

      - name: Run Norminette
        run: |
          norminette include src | tee norminette_output.txt
          if grep -q "Error!" norminette_output.txt; then
            echo "❌ Norminette found errors!"
            exit 1
          else
            echo "✅ No norm errors found!"
          fi

      - name: Show Norminette report
        run: |
          # Verificando se o arquivo de saída norminette_output.txt existe
          if [ -f norminette_output.txt ]; then
            ERROR_COUNT=$(grep -c "Error!" norminette_output.txt || echo 0)  # Definir 0 caso o comando falhe
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "## 📊 Norminette Errors Report" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric       | Count  |" >> $GITHUB_STEP_SUMMARY
              echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
              echo "| Errors       | **${ERROR_COUNT}**  |" >> $GITHUB_STEP_SUMMARY
              echo "❌ Norminette found ${ERROR_COUNT} errors! Please fix them before merging." >> $GITHUB_STEP_SUMMARY
            else
              echo "## 📊 Norminette Report" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric       | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
              echo "| Errors       | **None** |" >> $GITHUB_STEP_SUMMARY
              echo "✅ No norm errors found!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ norminette_output.txt file not found!"
            exit 1
          fi
