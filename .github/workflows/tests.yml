name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            gcc-10 g++-10 make libcriterion-dev jq build-essential

      - name: Make vendored tools executable
        run: chmod +x ./lib/gcovr-8.6-linux-x86_64

      - name: Build, run tests and coverage
        run: |
          set -e
          make CC=gcc-10 test
          make CC=gcc-10 test-run
          make CC=gcc-10 coverage

      - name: Show coverage summary
        run: |
          LINES=$(jq '.line_percent' coverage.json)
          FUNCTIONS=$(jq '.function_percent' coverage.json)
          BRANCHES=$(jq '.branch_percent' coverage.json)
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric    | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines     | **${LINES}%** |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | **${FUNCTIONS}%** |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches  | **${BRANCHES}%** |" >> $GITHUB_STEP_SUMMARY
